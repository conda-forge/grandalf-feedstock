{% set name = "grandalf" %}
{% set version = "0.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bdcht/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 82d80072e5a1928bc46d94a54d2d92a38f73da0af052efc84ce34b5f4601dfa2

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install --no-deps . -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
    - pytest-runner
  run:
    - python >={{ python_min }}
    - pyparsing
    - future

test:
  requires:
    - python {{ python_min }}
  imports:
    - grandalf

about:
  home: https://github.com/bdcht/grandalf
  license: GPL-2.0 OR EPL-1.0
  license_file: LICENSE
  summary: 'Graph and drawing algorithms framework'

  # The remaining entries in this section are optional, but recommended.
  description: |
    Grandalf is a Python package made for experimentations with graphs and drawing
    algorithms. It is written in pure python.
  dev_url: https://github.com/bdcht/grandalf

extra:
  recipe-maintainers:
    - shcheklein
    - efiop
